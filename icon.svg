<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A72"/>
      <stop offset="100%" stop-color="#0C1B3A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- Horizontal texture (referência ao logo original) -->
  <g opacity="0.045" stroke="white" stroke-width="1.2">
    <line x1="0" y1="40"  x2="512" y2="40"/>
    <line x1="0" y1="80"  x2="512" y2="80"/>
    <line x1="0" y1="120" x2="512" y2="120"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="200" x2="512" y2="200"/>
    <line x1="0" y1="240" x2="512" y2="240"/>
    <line x1="0" y1="280" x2="512" y2="280"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="360" x2="512" y2="360"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="0" y1="440" x2="512" y2="440"/>
    <line x1="0" y1="480" x2="512" y2="480"/>
  </g>

  <!-- Colunas do símbolo Brunelli (lado esquerdo) -->
  <!-- Base de todas as colunas em y=420 -->
  <rect x="32"  y="238" width="22" height="182" rx="3" fill="white" opacity="0.95"/>
  <rect x="63"  y="174" width="22" height="246" rx="3" fill="white" opacity="0.95"/>
  <rect x="94"  y="108" width="24" height="312" rx="3" fill="white" opacity="0.95"/>
  <rect x="127" y="174" width="22" height="246" rx="3" fill="white" opacity="0.95"/>
  <rect x="158" y="238" width="22" height="182" rx="3" fill="white" opacity="0.95"/>

  <!-- Plataforma base -->
  <rect x="30" y="416" width="156" height="8"  rx="4" fill="white" opacity="0.90"/>
  <rect x="30" y="422" width="156" height="5"  rx="2.5" fill="#D4AB52"/>

  <!-- Texto: Construtora -->
  <text x="204" y="234"
        font-family="Arial, Helvetica, sans-serif"
        font-size="30" font-weight="300"
        fill="white" opacity="0.88"
        letter-spacing="3">Construtora</text>

  <!-- Texto: Brunelli -->
  <text x="204" y="335"
        font-family="Arial, Helvetica, sans-serif"
        font-size="80" font-weight="700"
        fill="white">Brunelli</text>
</svg>
